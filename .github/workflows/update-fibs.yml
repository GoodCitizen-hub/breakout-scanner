name: Update Fibs from Twelve Data

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  update-fibs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch 52-week Fib data and update fibs.json
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, time
          from datetime import date

          import os
          TDKEY = os.environ["TDKEY"]

          SYMS = [
            "PLTR","AVGO","AMZN","NVDA","META","GOOGL","MSFT","AAPL","AMD","TSLA",
            "CRM","PANW","NET","DDOG","CRWD","MRVL","SNOW","ARM","SMCI","AMAT",
            "ORCL","NOW","UBER","COIN","SHOP","SOFI","HOOD","MSTR","LYFT","IONQ",
            "MU","APP","JPM","BAC","GS","V","LLY","UNH","ABBV","MRNA",
            "XOM","CVX","OXY","WMT","COST","NFLX","PYPL","SQ","DELL","RKLB",
            "ACN","COHR","STX","WDC","ANET","AXP","CEG","AVAV","ADBE","TSM",
            "SNDK","IREN","AEHR","AEIS","APLD","POET","ACHR","SOUN","CRMD","TKC",
            "GTE","BBAI","NBIS"
          ]

          # Preserve existing file so a partial failure doesn't wipe good data
          try:
            with open("fibs.json","r") as f:
              data = json.load(f)
            if "stocks" not in data:
              data["stocks"] = {}
          except Exception:
            data = {"stocks":{}}

          updated = 0
          failed = []

          def fetch_52w(sym):
            """Pull 252 daily bars from Twelve Data and return (low52, high52, bars)."""
            url = (
              "https://api.twelvedata.com/time_series"
              f"?symbol={sym}&interval=1day&outputsize=252"
              f"&apikey={TDKEY}&format=JSON"
            )
            req = urllib.request.Request(url, headers={"User-Agent":"GoodCitizen/1.0"})
            with urllib.request.urlopen(req, timeout=20) as resp:
              d = json.loads(resp.read().decode())
            if d.get("status") == "error":
              raise RuntimeError(d.get("message","TD error"))
            vals = d.get("values")
            if not vals or not isinstance(vals, list):
              raise RuntimeError("no values")
            highs = [float(v["high"]) for v in vals if v.get("high") not in (None,"")]
            lows  = [float(v["low"])  for v in vals if v.get("low")  not in (None,"")]
            highs = [h for h in highs if h > 0]
            lows  = [l for l in lows  if l > 0]
            if not highs or not lows:
              raise RuntimeError("no valid prices")
            high52 = max(highs)
            low52  = min(lows)
            rng    = high52 - low52
            # Sanity guards — reject obviously-wrong ranges
            if low52 <= 0 or high52 <= low52:
              raise RuntimeError(f"invalid range low={low52} high={high52}")
            if rng < (low52 * 0.05):
              raise RuntimeError(f"suspicious range low={low52} high={high52} rng={rng}")
            if len(vals) < 150:
              raise RuntimeError(f"insufficient bars {len(vals)}")
            return low52, high52, len(vals)

          for sym in SYMS:
            try:
              low52, high52, bars = fetch_52w(sym)
              data["stocks"][sym] = {"low": round(low52,2), "high": round(high52,2)}
              updated += 1
              print(f"  {sym}: ${low52:.2f} - ${high52:.2f}  ({bars} bars)")
            except Exception as e:
              failed.append(sym)
              print(f"  {sym}: ERROR {e}  (kept previous value if any)")
            # Twelve Data free tier = 8 calls/min. 8s spacing keeps us safely under.
            time.sleep(8)

          data["updated"] = str(date.today())
          data["updated_count"] = updated
          data["source"] = "twelvedata-52week"

          with open("fibs.json","w") as f:
            json.dump(data, f, indent=2)

          print(f"\nDone: {updated}/{len(SYMS)} updated")
          if failed:
            print(f"Failed: {', '.join(failed)}")
          PYEOF
        env:
          TDKEY: ${{ secrets.TDKEY }}

      - name: Commit updated fibs.json
        run: |
          git config user.name "GoodCitizen Bot"
          git config user.email "bot@goodcitizen.dev"
          git add fibs.json
          git diff --staged --quiet || git commit -m "Auto-update fibs.json $(date '+%Y-%m-%d')"
          git push
